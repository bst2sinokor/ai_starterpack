<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINOKOR AI 스타터팩 인트로</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blossom:        #FFB3C6;
  --blossom-deep:   #E8729A;
  --blossom-deeper: #C94B7B;
  --blossom-light:  #FFF0F6;
  --blossom-text:   #5C1B3A;
  --text-dark:      #1d1d1f;
  --text-muted:     rgba(92,27,58,0.55);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
}

/* ══════════════════════════════
   배경
══════════════════════════════ */
.bg-main {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #FFE5F0 0%, #FFCCE3 35%, #FFB8D4 65%, #FF9DBD 100%);
}
.bg-orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 1;
}
.orb1 {
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(232,114,154,0.25) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  animation: orbFloat 15s ease-in-out infinite reverse;
}
.orb3 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
  top: 40%; left: 55%;
  animation: orbFloat 10s ease-in-out infinite; animation-delay: -3s;
}
@keyframes orbFloat {
  0%,100% { transform:translate(0,0); }
  33%      { transform:translate(20px,-15px); }
  66%      { transform:translate(-15px,10px); }
}

/* 빛 줄기 */
.ray {
  position: fixed; top: -10%; width: 1px; height: 80%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.6), transparent);
  transform-origin: top center; z-index: 2;
  animation: rayPulse 7s ease-in-out infinite;
}
.ray1 { left:20%; transform:rotate(-6deg); animation-delay:0s; }
.ray2 { left:50%; transform:rotate(0deg);  animation-delay:2.5s; opacity:.7; }
.ray3 { left:78%; transform:rotate(6deg);  animation-delay:5s; }
@keyframes rayPulse { 0%,100%{opacity:0} 50%{opacity:1} }

/* 물결 */
.ocean { position:fixed; bottom:0; left:0; right:0; z-index:2; height:180px; overflow:hidden; }
.wave  { position:absolute; bottom:0; left:-100%; width:300%; height:140px; border-radius:50%; }
.wave1 {
  background: radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.35) 0%, transparent 70%);
  animation: waveDrift 14s ease-in-out infinite; bottom:-10px;
}
.wave2 {
  background: radial-gradient(ellipse at 50% 100%, rgba(201,75,123,0.08) 0%, transparent 70%);
  animation: waveDrift 19s ease-in-out infinite reverse; bottom:15px; animation-delay:-5s;
}
.wave3 {
  background: radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.2) 0%, transparent 70%);
  animation: waveDrift 24s ease-in-out infinite; bottom:35px; animation-delay:-10s;
}
@keyframes waveDrift {
  0%,100% { transform:translateX(0) scaleY(1); }
  33%      { transform:translateX(6%) scaleY(1.05); }
  66%      { transform:translateX(-6%) scaleY(.96); }
}

/* 벚꽃 캔버스 */
.petal-canvas { position:fixed; inset:0; z-index:3; pointer-events:none; }

/* ══════════════════════════════
   스테이지
══════════════════════════════ */
.stage {
  position:relative; width:100%; height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
}


/* 텍스트 슬롯 공통 */
.text-slot { position:absolute; width:100%; text-align:center; padding:0 6%; opacity:0; pointer-events:none; }

/* 키프레임 */
@keyframes fadeUp  { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-20px)} }
@keyframes zoomIn  { from{opacity:0;transform:scale(.9);filter:blur(6px)} to{opacity:1;transform:scale(1);filter:blur(0)} }
@keyframes zoomOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.06);filter:blur(3px)} }
@keyframes fadeIn  { to{opacity:1} }

/* ── 컷 1 ── */
.cut1 { animation: fadeUp .9s cubic-bezier(.16,1,.3,1) 1.0s forwards, fadeOut .6s ease 4.8s forwards; }
.cut1 .q-wrap {
  display:inline-block; position:relative;
  background:rgba(255,255,255,.5); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.75); border-radius:24px;
  padding:40px 52px;
  box-shadow:0 8px 40px rgba(201,75,123,.12), 0 2px 8px rgba(0,0,0,.05);
}
.cut1 .q-text {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(22px,3.8vw,46px); font-weight:300;
  color:var(--text-dark); line-height:1.75; letter-spacing:-.01em;
}
.cut1 .q-hl { color:var(--blossom-deeper); font-weight:600; position:relative; }
.cut1 .q-hl::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--blossom-deeper),transparent);
  animation:lineGrow .8s ease 2.2s both; transform:scaleX(0);
}
@keyframes lineGrow { to{transform:scaleX(1)} }

/* ── 컷 2 ── */
.cut2 { animation: zoomIn .8s cubic-bezier(.16,1,.3,1) 5.6s forwards, zoomOut .6s ease 9.0s forwards; }
.cut2 .big {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(48px,8.5vw,100px); font-weight:700; letter-spacing:-.04em;
  background:linear-gradient(135deg,var(--blossom-text) 0%,var(--blossom-deeper) 50%,var(--blossom-deep) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.cut2 .period { -webkit-text-fill-color:var(--blossom-deeper); }
.cut2 .deco { display:flex; align-items:center; justify-content:center; gap:18px; margin-top:28px; opacity:0; animation:fadeIn .6s ease 6.5s forwards; }
.cut2 .deco-line { flex:1; max-width:80px; height:1.5px; background:linear-gradient(90deg,transparent,var(--blossom-deep)); border-radius:1px; }
.cut2 .deco-line.r { background:linear-gradient(90deg,var(--blossom-deep),transparent); }
.cut2 .deco-petal { font-size:22px; }

/* ── 컷 3 ── */
.cut3 { animation: fadeUp .9s cubic-bezier(.16,1,.3,1) 9.8s forwards, fadeOut .6s ease 14.0s forwards; }
.cut3 .sub { font-family:'Noto Serif KR',serif; font-size:clamp(13px,1.8vw,16px); font-weight:300; font-style:italic; color:var(--text-muted); letter-spacing:.18em; margin-bottom:28px; opacity:0; animation:fadeIn .7s ease 10.4s forwards; }
.cut3 .main { font-family:'Noto Serif KR',serif; font-size:clamp(30px,5.4vw,64px); font-weight:400; color:var(--text-dark); letter-spacing:.02em; line-height:1.55; opacity:0; animation:fadeIn .8s ease 11.0s forwards; }
.cut3 .sub-line { font-size:.56em; display:block; color:var(--text-muted); font-weight:300; margin-bottom:14px; letter-spacing:.1em; }
.cut3 .big-ko {
  display:block;
  font-family:'Noto Serif KR',serif;
  font-size:clamp(48px,8.5vw,100px); font-weight:700; letter-spacing:-.04em;
  background:linear-gradient(135deg,var(--blossom-text) 0%,var(--blossom-deeper) 50%,var(--blossom-deep) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  word-break:keep-all;
}

/* ── 컷 4 ── */
.cut4 { animation: fadeUp .9s cubic-bezier(.16,1,.3,1) 14.8s forwards, fadeOut .6s ease 19.0s forwards; }
.cut4 .tags { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:24px; opacity:0; animation:fadeIn .6s ease 15.3s forwards; }
.cut4 .tag { font-size:11px; letter-spacing:.22em; font-weight:600; color:var(--blossom-deeper); text-transform:uppercase; background:rgba(255,255,255,.6); border:1px solid rgba(201,75,123,.25); padding:6px 16px; border-radius:100px; backdrop-filter:blur(8px); }
.cut4 .main { font-family:'Noto Serif KR',serif; font-size:clamp(26px,4.8vw,58px); font-weight:400; color:var(--text-dark); line-height:1.45; opacity:0; animation:fadeIn .8s ease 15.9s forwards; }
.cut4 .accent { font-weight:700; background:linear-gradient(135deg,var(--blossom-deeper),var(--blossom-deep)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

/* ── 컷 5 ── */
.cut5 { animation: zoomIn 1.1s cubic-bezier(.16,1,.3,1) 19.8s forwards; }
.cut5 .eyebrow { font-size:clamp(11px,1.2vw,13px); letter-spacing:.45em; color:var(--blossom-deeper); font-weight:600; text-transform:uppercase; opacity:0; animation:fadeIn .6s ease 20.5s forwards; margin-bottom:18px; }
.cut5 .card {
  display:inline-block;
  background:rgba(255,255,255,.55); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.8); border-radius:32px;
  padding:48px 64px;
  box-shadow:0 16px 60px rgba(201,75,123,.15), 0 4px 16px rgba(0,0,0,.06);
  opacity:0; animation:fadeIn .9s ease 20.8s forwards;
}
.cut5 .sub-title { font-family:'Noto Serif KR',serif; font-size:clamp(16px,2.2vw,24px); font-weight:300; color:var(--blossom-deeper); letter-spacing:.08em; margin-bottom:12px; }
.cut5 .main-title {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(44px,8vw,96px); font-weight:700; letter-spacing:-.04em; line-height:1.05;
  background:linear-gradient(135deg,var(--blossom-text) 0%,var(--blossom-deeper) 60%,var(--blossom-deep) 100%);
  background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 3s ease 21.5s infinite; margin-bottom:20px;
}
@keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.cut5 .tagline { font-size:clamp(15px,2vw,20px); font-weight:300; color:var(--text-muted); letter-spacing:.02em; }
.cut5 .tagline strong { color:var(--text-dark); font-weight:600; }

/* 하단 */
.bottom-hint { position:absolute; bottom:36px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; animation:fadeIn .8s ease 21.2s forwards; }
.scroll-txt { font-size:13px; letter-spacing:.45em; color:var(--blossom-deeper); font-weight:700; text-transform:uppercase; text-shadow:0 1px 8px rgba(201,75,123,.3); }
.scroll-arrow { width:44px; height:44px; border:2px solid var(--blossom-deeper); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--blossom-deeper); background:rgba(255,255,255,.5); backdrop-filter:blur(8px); box-shadow:0 4px 20px rgba(201,75,123,.3); animation:bounce 1.4s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }

/* 프로그레스 바 */
.progress { position:absolute; bottom:0; left:0; height:3px; width:0%; background:linear-gradient(90deg,var(--blossom-deeper),var(--blossom),var(--blossom-deeper)); background-size:200%; animation:progress 25s linear .5s forwards, shimmer 3s ease infinite; z-index:20; border-radius:0 2px 2px 0; }
@keyframes progress { to{width:100%} }

/* 다시보기 */
.replay-btn { position:absolute; bottom:22px; right:28px; background:rgba(255,255,255,.5); border:1px solid rgba(201,75,123,.25); color:var(--blossom-deeper); font-size:11px; letter-spacing:.18em; padding:8px 18px; border-radius:100px; cursor:pointer; opacity:0; animation:fadeIn .6s ease 23.5s forwards; transition:all .2s; font-family:inherit; z-index:20; backdrop-filter:blur(8px); }
.replay-btn:hover { background:rgba(255,255,255,.8); border-color:rgba(201,75,123,.5); }
</style>
</head>
<body>

<div class="bg-main"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="ray ray1"></div>
<div class="ray ray2"></div>
<div class="ray ray3"></div>
<div class="ocean">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>
</div>
<canvas class="petal-canvas" id="petalCanvas"></canvas>

<div class="stage">
  <div class="text-slot cut1">
    <div class="q-wrap">
      <p class="q-text">AI 써야 한다는데...<br><span class="q-hl">어디서부터 시작하지?</span></p>
    </div>
  </div>

  <div class="text-slot cut2">
    <p class="big">걱정 마세요</p>
  </div>

  <div class="text-slot cut3">
    <p class="sub">AI is changing the way we work</p>
    <p class="main">
      <span class="sub-line">일하는 방식이 바뀌고 있습니다</span>
      <span class="big-ko">SINOKOR도 바뀝니다</span>
    </p>
  </div>

  <div class="text-slot cut4">
    <div class="tags">
      <span class="tag">계정 만들기</span>
      <span class="tag">AI 도구</span>
      <span class="tag">실무 활용</span>
    </div>
    <p class="main">처음부터 끝까지<br><span class="accent">한 곳에서</span></p>
  </div>

  <div class="text-slot cut5">
    <p class="eyebrow">SINOKOR AI GUIDE 2026</p>
    <div class="card">
      <p class="sub-title">AI 스타터팩</p>
      <p class="main-title">처음이어도<br>괜찮습니다</p>
      <p class="tagline">지금 바로 <strong>시작</strong>해 보세요.</p>
    </div>
  </div>

  <div class="bottom-hint">
    <span class="scroll-txt">Scroll</span>
    <div class="scroll-arrow">↓</div>
  </div>
  <div class="progress"></div>
  <button class="replay-btn" onclick="location.reload()">↺ 다시보기</button>
</div>

<script>
const canvas = document.getElementById('petalCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 사이트 벚꽃 팔레트
const COLORS = [
  [255,179,198], [255,204,227], [232,114,154],
  [255,240,246], [255,255,255], [255,157,189],
];

class Petal {
  constructor(init) { this.reset(init); }
  reset(init) {
    this.x  = Math.random() * canvas.width;
    this.y  = init ? Math.random() * canvas.height : -16;
    this.sz = 5 + Math.random() * 9;
    this.sp = 0.7 + Math.random() * 1.3;
    this.wd = (Math.random() - .5) * .9;
    this.rt = Math.random() * Math.PI * 2;
    this.rs = (Math.random() - .5) * .03;
    this.op = 0.45 + Math.random() * 0.45;
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.r = c[0]; this.g = c[1]; this.b = c[2];
    this.wb = Math.random() * Math.PI * 2;
    this.ws = 0.018 + Math.random() * 0.022;
  }
  update() {
    this.wb += this.ws;
    this.x  += this.wd + Math.sin(this.wb) * .6;
    this.y  += this.sp; this.rt += this.rs;
    if (this.y > canvas.height + 20) this.reset(false);
  }
  draw() {
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rt);
    ctx.globalAlpha = this.op;
    ctx.beginPath(); ctx.ellipse(0, 0, this.sz, this.sz * .55, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`; ctx.fill();
    ctx.beginPath(); ctx.ellipse(-this.sz*.22, -this.sz*.18, this.sz*.28, this.sz*.13, -.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
    ctx.restore();
  }
}

const petals = Array.from({length: 45}, (_, i) => new Petal(true));
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
